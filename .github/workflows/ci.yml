name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Show compiler version
        run: c++ --version

      - name: Build
        run: make

      - name: Run test suite
        run: make test

      - name: Sanity-check the examples
        run: |
          test "$(./bin/lvp '(()')" = "2"
          test "$(./bin/lvp ')()())')" = "4"
          test "$(./bin/lvp '')" = "0"
          echo "All example checks passed."
